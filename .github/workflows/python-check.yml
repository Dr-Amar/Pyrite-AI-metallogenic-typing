name: Python notebook metadata check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbformat
      - name: Validate notebooks parse as JSON
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat
          for p in Path('notebooks').glob('*.ipynb'):
              nbformat.read(p, as_version=4)
              print('OK', p)
          PY
